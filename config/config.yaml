# ================================================================================
## JSON to mask
data_dir: C:/Users/Admin/Data/annotation/
class_mapping:
    background: 0
    fissure souple: 1
    fissure souple reparee: 2
    depart de materiaux souple: 3
    desenrobage: 4
    remontee de fines: 5
    ressuage: 6
    depot de gomme: 7
    fissure rigide: 8
    fissure rigide reparee: 9
    depart de materiaux rigide: 10
    faiencage: 11
    defaut de joint: 12
    joint: 13
    vegetation: 14
    marquage: 15
    jonction: 16
    objet: 17
    autre: 18
# define priority: lowest priority first, highest priority last
priority_list:
- marquage
- faiencage
- remontee de fines
- depot de gomme
- jonction
- ressuage
- joint
- defaut de joint
- desenrobage
- fissure souple reparee
- fissure rigide reparee
- fissure souple
- fissure rigide
- depart de materiaux rigide
- depart de materiaux souple
- objet
- vegetation
- autre
dilation_kernel_size: 5
ignore_index: 255
# ================================================================================
## train
name: DLV3P_MIT_B2_1
save_dir: C:/Users/Admin/Code/cbc_seg/output/
# dataset
num_classes: 18
patch_per_row: 4
patch_per_col: 2
patch_size: 512
patch_overlap: 0.
# dataloader
batch_size: 1
num_workers: 4
# training
use_gpu: true
lr: 3.e-4
eta_min: 1.e-6
weight_decay: 1.e-4
tversky_alpha: 0.3  # Forgiving to thick boundaries (False Positives)
tversky_beta: 0.7  # Harsh on gaps (False Negatives)
max_epochs: 1
accumulate_grad_batches: 4
log_every_n_steps: 100
