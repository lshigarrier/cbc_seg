# ================================================================================
## JSON to mask
class_mapping:
    background: 0
    fissure souple: 1
    fissure souple reparee: 2
    depart de materiaux souple: 3
    desenrobage: 4
    remontee de fines: 5
    ressuage: 6
    depot de gomme: 7
    fissure rigide: 8
    fissure rigide reparee: 9
    depart de materiaux rigide: 10
    faiencage: 11
    defaut de joint: 12
    joint: 13
    vegetation: 14
    marquage: 15
    jonction: 16
    objet: 17
    autre: 18
# define priority: lowest priority first, highest priority last
priority_list:
    - marquage
    - faiencage
    - remontee de fines
    - depot de gomme
    - jonction
    - ressuage
    - joint
    - defaut de joint
    - desenrobage
    - fissure souple reparee
    - fissure rigide reparee
    - fissure souple
    - fissure rigide
    - depart de materiaux rigide
    - depart de materiaux souple
    - objet
    - vegetation
    - autre
boundary_settings:
    default:
        outside: 2
        inside: 1
    fissure souple:
        outside: 1
        inside: 2
# ================================================================================
## inference
colors:
    - [0, 0, 0]
    - [255, 0, 0]
    - [0, 255, 0]
    - [0, 0, 255]
    - [255, 255, 0]
    - [255, 0, 255]
    - [0, 255, 255]
    - [255, 128, 0]
    - [255, 0, 128]
    - [0, 255, 128]
    - [128, 255, 0]
    - [128, 0, 255]
    - [0, 128, 255]
    - [128, 0, 0]
    - [0, 128, 0]
    - [0, 0, 128]
    - [128, 128, 0]
    - [128, 0, 128]
    - [0, 128, 128]
# ================================================================================
## mosaic
input_dir: C:/Users/Admin/Data/test_mosaic/raw_images
output_dir: C:/Users/Admin/Data/test_mosaic/processed_images
# projection
crs_gps: EPSG:4326
crs_projected: EPSG:3944
heading_smoothing_window: 5
cam_offset_x: 0.0
cam_offset_y: 3.0
# image dimension
downscale_factor: 0.05
span_width: 3.0
# stitching
stitch_downscale_factor: 0.25
orb_nfeatures: 3000
orb_ratio_threshold: 0.75
min_match_count: 20
ransac_threshold: 3.0
max_angle_deviation_rad: 0.2
vehicle_step: 1.5
weight_gps_v_kin: 1.0